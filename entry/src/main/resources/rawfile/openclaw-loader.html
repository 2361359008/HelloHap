<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenClaw Loading...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    color: #cdd6f4;
    font-family: -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
  }
  .container { padding: 20px; }
  .spinner {
    width: 40px; height: 40px;
    margin: 0 auto 20px;
    border: 4px solid #313244;
    border-top: 4px solid #89b4fa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { font-size: 16px; margin-bottom: 8px; }
  .error { color: #f38ba8; font-size: 14px; display: none; }
  .retry-btn {
    display: none;
    margin-top: 16px;
    padding: 10px 24px;
    font-size: 16px;
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">正在获取认证信息...</div>
  <div class="error" id="error"></div>
  <button class="retry-btn" id="retryBtn" onclick="loadToken()">重试</button>
</div>
<script>
var GATEWAY_URL = 'http://127.0.0.1:18800/';
var TOKEN_URL   = 'http://127.0.0.1:7681/token';
var MAX_RETRY   = 10;
var RETRY_DELAY = 2000;
var attempt = 0;

function loadToken() {
  attempt++;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('status').textContent =
    '正在获取认证信息...' + (attempt > 1 ? ' (第' + attempt + '次)' : '');

  fetch(TOKEN_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(token) {
      token = token.trim();
      if (!token || token.indexOf('error') === 0) {
        throw new Error(token || 'empty token');
      }
      document.getElementById('status').textContent = '认证成功，正在跳转...';
      window.location.replace(GATEWAY_URL + '#token=' + token);
    })
    .catch(function(err) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = '获取 Token 失败: ' + err.message;

      if (attempt < MAX_RETRY) {
        document.getElementById('status').textContent =
          attempt + '/' + MAX_RETRY + ' 次失败，' + (RETRY_DELAY/1000) + '秒后重试...';
        setTimeout(loadToken, RETRY_DELAY);
      } else {
        document.getElementById('status').textContent = '多次重试失败，请检查服务是否启动';
        document.getElementById('retryBtn').style.display = 'inline-block';
        attempt = 0;
      }
    });
}

loadToken();
</script>
</body>
</html>
